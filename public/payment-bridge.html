<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>问路｜手机支付跳转</title>
  <link rel="stylesheet" href="/auth.css?v=20260612-2" />
</head>
<body data-page="bridge">
  <main class="page">
    <section class="shell">
      <section class="hero hero-wide">
        <div class="brand-block">
          <div class="brand-mark">WL</div>
          <div>
            <p class="eyebrow">PAYMENT BRIDGE</p>
            <h1 class="brand-title">手机支付跳转中</h1>
          </div>
        </div>
        <p class="lead" style="margin-top:14px;">正在为你打开手机端支付流程，如果没有自动跳转，可点击下方按钮继续。</p>
        <div id="bridge-status" class="status info" style="margin-top:14px;">正在获取订单支付信息…</div>
        <div class="card-actions" style="margin-top:16px;">
          <a id="open-payment-btn" class="btn-primary hidden" href="#" rel="noreferrer">继续前往支付</a>
          <button id="retry-btn" class="btn-secondary hidden" type="button">重新尝试</button>
          <a class="btn-ghost" href="/payment.html">返回充值中心</a>
        </div>
      </section>
    </section>
  </main>
  <script src="/payment.js"></script>
  <script>
    (function () {
      function $(id) { return document.getElementById(id); }
      function query(name) {
        try { return new URLSearchParams(location.search).get(name) || ''; } catch (_) { return ''; }
      }
      function setStatus(text) { var el = $('bridge-status'); if (el) el.textContent = text || ''; }
      function setManualLink(url) { var el = $('open-payment-btn'); if (!el) return; if (url) { el.href = url; el.classList.remove('hidden'); } else { el.classList.add('hidden'); } }
      function showRetry() { var el = $('retry-btn'); if (el) el.classList.remove('hidden'); }
      function submitGatewayForm(form) {
        if (!form || !form.action || !form.fields || typeof form.fields !== 'object') return false;
        var node = document.createElement('form'); node.method = (form.method || 'POST').toUpperCase(); node.action = form.action; node.style.display = 'none';
        Object.keys(form.fields).forEach(function (key) { var input = document.createElement('input'); input.type = 'hidden'; input.name = key; input.value = String(form.fields[key] == null ? '' : form.fields[key]); node.appendChild(input); });
        document.body.appendChild(node); node.submit(); return true;
      }
      async function start() {
        var orderId = query('orderId'); var exp = query('exp'); var sig = query('sig');
        if (!orderId || !exp || !sig) { setStatus('缺少订单参数，请回到网站重新生成二维码。'); showRetry(); return; }
        try {
          setStatus('正在准备手机支付入口…');
          var resp = await fetch('/api/payments/bridge/resolve?orderId=' + encodeURIComponent(orderId) + '&exp=' + encodeURIComponent(exp) + '&sig=' + encodeURIComponent(sig), { method: 'GET', credentials: 'omit' });
          var data = await resp.json().catch(function () { return null; });
          if (!resp.ok || !data || !data.bridge) throw new Error((data && (data.error || data.message)) || '获取手机支付入口失败');
          var bridge = data.bridge || {}; var fallbackUrl = bridge.paymentUrl || bridge.payPageUrl || '';
          if (fallbackUrl) setManualLink(fallbackUrl);
          if (bridge.gatewayForm && submitGatewayForm(bridge.gatewayForm)) { setStatus('正在打开手机支付页面，请稍候…'); return; }
          if (fallbackUrl) { setStatus('正在跳转到手机支付页面…'); location.href = fallbackUrl; return; }
          throw new Error('当前订单尚未准备好手机支付入口');
        } catch (error) {
          setStatus(error && error.message ? error.message : '手机支付跳转失败，请稍后再试。');
          showRetry();
        }
      }
      $('retry-btn') && $('retry-btn').addEventListener('click', function () { location.reload(); });
      start();
    })();
  </script>
</body>
</html>

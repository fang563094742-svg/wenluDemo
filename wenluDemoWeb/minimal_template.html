<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>问路最小页面模板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2328;
      --muted: #667085;
      --accent: #2563eb;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card {
      width: min(92vw, 680px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 16px;
    }
    .tag {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eff6ff;
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>测试页面模板</h1>
    <p>这是一个可直接打开查看的最小 HTML 模板。</p>
    <p>你下次只要告诉我要改标题、文案、配色或结构，我就能继续直接往这个模板上改。</p>
    <span class="tag">可复用样本</span>
  </main>
</body>
</html>

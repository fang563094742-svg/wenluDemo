<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>问路最小成品</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --card: rgba(255,255,255,0.08);
      --text: #f3f6ff;
      --muted: #b8c0d9;
      --accent: #7c9cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #162042, var(--bg));
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .card {
      width: min(680px, calc(100vw - 32px));
      padding: 32px;
      border-radius: 20px;
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }
    h1 { margin: 0 0 12px; font-size: clamp(32px, 6vw, 52px); }
    p { margin: 0 0 16px; line-height: 1.7; color: var(--muted); }
    .tag {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(124,156,255,0.18);
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="tag">最小可展示成品</span>
    <h1>问路最小成品</h1>
    <p>这是一个已经可直接打开给别人看的单页成品，不再只是“测试”。</p>
    <p>唯一验收：打开 <code>wenluDemoWeb/index.html</code> 时，页面能看到标题“问路最小成品”和标签“最小可展示成品”。</p>
  </main>
</body>
</html>
